name: Health Check

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Pull Docker image
        run: docker pull 1357912468/capstone-app:latest

      - name: Run container
        run: docker run -d -p 5000:5000 --name myapp 1357912468/capstone-app:latest

      - name: Wait for app to start
        run: sleep 5

      - name: Health check
        id: health
        run: |
          if curl -f http://localhost:5000/ > /dev/null; then
            echo "status=PASSED" >> $GITHUB_OUTPUT
          else
            echo "status=FAILED" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Stop and remove container
        if: always()
        run: |
          docker stop myapp
          docker rm myapp

      - name: Create summary
        if: always()
        run: |
          echo "## Health Check Report" >> $GITHUB_STEP_SUMMARY
          echo "- Image: 1357912468/capstone-app:latest" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ steps.health.outputs.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date)" >> $GITHUB_STEP_SUMMARY